<meta charset="UTF-8">

<title>قائمة أسماء Telegram المتاحة</title>
<style>

  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
  header { background: #1a1a2e; padding: 18px 24px; border-bottom: 2px solid #16213e; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.3rem; color: #4fc3f7; margin-bottom: 10px; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .controls input[type=text] { background: #16213e; border: 1px solid #334; color: #e0e0e0; padding: 7px 12px; border-radius: 6px; font-size: 0.9rem; width: 200px; }
  .controls input[type=text]::placeholder { color: #888; }
  .btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s; }
  .btn-blue { background: #1565c0; color: #fff; }
  .btn-blue:hover { background: #1976d2; }
  .btn-green { background: #2e7d32; color: #fff; }
  .btn-green:hover { background: #388e3c; }
  .btn-red { background: #c62828; color: #fff; }
  .btn-red:hover { background: #d32f2f; }
  .btn-gray { background: #424242; color: #fff; }
  .btn-gray:hover { background: #616161; }
  .tier-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .tier-btn { padding: 5px 12px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-size: 0.8rem; font-weight: bold; }
  .tier-btn.active { border-color: #fff; }
  .t-all { background: #333; color: #fff; }
  .t-1-btn { background: #1b5e20; color: #a5d6a7; }
  .t-2-btn { background: #0d47a1; color: #90caf9; }
  .t-3-btn { background: #e65100; color: #ffcc80; }
  .t-4-btn { background: #37474f; color: #b0bec5; }
  .stats { display: flex; gap: 14px; font-size: 0.8rem; color: #aaa; align-items: center; flex-wrap: wrap; }
  .stat-val { color: #4fc3f7; font-weight: bold; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead th { background: #16213e; color: #90caf9; padding: 10px 12px; text-align: right; position: sticky; top: 0; border-bottom: 1px solid #334; font-size: 0.8rem; }
  tbody tr { border-bottom: 1px solid #1e1e2e; transition: background 0.15s; }
  tbody tr:hover { background: #1a1a2e; }
  tbody tr.done { opacity: 0.5; }
  td { padding: 7px 12px; vertical-align: middle; }
  .td-num { color: #666; width: 46px; text-align: center; font-size: 0.78rem; }
  .td-tier { width: 90px; text-align: center; }
  .tier-badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 0.72rem; font-weight: bold; }
  .tier-1 { background: #1b5e20; color: #a5d6a7; }
  .tier-2 { background: #0d47a1; color: #90caf9; }
  .tier-3 { background: #bf360c; color: #ffcc80; }
  .tier-4 { background: #37474f; color: #b0bec5; }
  .td-name { font-family: monospace; font-size: 1rem; font-weight: bold; letter-spacing: 1px; width: 110px; }
  .td-name a { color: #4fc3f7; text-decoration: none; }
  .td-name a:hover { text-decoration: underline; }
  .td-check { width: 60px; text-align: center; }
  .td-check input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #4fc3f7; }
  .td-notes input[type=text] { background: #111; border: 1px solid #333; color: #ccc; padding: 5px 8px; border-radius: 5px; width: 100%; font-size: 0.82rem; }
  .td-notes input[type=text]:focus { outline: none; border-color: #4fc3f7; background: #1a1a2e; }
  .save-indicator { color: #4caf50; font-size: 0.78rem; }
  .container { padding: 0 0 40px; overflow-x: auto; }
  .empty-msg { text-align: center; color: #555; padding: 40px; font-size: 1rem; }
  .progress-bar-wrap { height: 4px; background: #1a1a2e; }
  .progress-bar { height: 4px; background: linear-gradient(90deg, #4fc3f7, #4caf50); transition: width 0.4s; }
</style>
</head>
<body>

<header>
  <h1>📋 قائمة أسماء Telegram المتاحة على Fragment</h1>
  <div class="controls">
    <input type="text" id="searchBox" placeholder="🔍 ابحث..." oninput="filterTable()">
    <div class="tier-btns">
      <button class="tier-btn t-all active" onclick="setTier('all',this)">الكل</button>
      <button class="tier-btn t-1-btn" onclick="setTier(1,this)">⭐ شائع جداً</button>
      <button class="tier-btn t-2-btn" onclick="setTier(2,this)">🔵 شائع</button>
      <button class="tier-btn t-3-btn" onclick="setTier(3,this)">🟠 أقل شيوعاً</button>
      <button class="tier-btn t-4-btn" onclick="setTier(4,this)">⚫ نادر</button>
    </div>
    <button class="btn btn-gray" onclick="setTier('untried',null)">☐ غير مجرَّب فقط</button>
    <button class="btn btn-green" onclick="exportData()">💾 تصدير JSON</button>
    <button class="btn btn-blue" onclick="importData()">📂 استيراد JSON</button>
    <span class="save-indicator" id="saveIndicator"></span>
  </div>
  <div style="margin-top:10px;" class="stats">
    <span>الإجمالي: <span class="stat-val" id="statTotal">0</span></span>
    <span>مُجرَّب: <span class="stat-val" id="statDone">0</span></span>
    <span>متبقي: <span class="stat-val" id="statLeft">0</span></span>
    <span>يُعرض: <span class="stat-val" id="statShown">0</span></span>
    <span>⭐ <span class="stat-val" id="s1">0</span></span>
    <span>🔵 <span class="stat-val" id="s2">0</span></span>
    <span>🟠 <span class="stat-val" id="s3">0</span></span>
    <span>⚫ <span class="stat-val" id="s4">0</span></span>
  </div>
  <div class="progress-bar-wrap" style="margin-top:8px;">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
</header>

<div class="container">
  <table id="mainTable">
    <thead>
      <tr>
        <th class="td-num">#</th>
        <th class="td-tier">الدرجة</th>
        <th class="td-name">الاسم</th>
        <th class="td-check">تم التجربة</th>
        <th>ملاحظات</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-msg" id="emptyMsg" style="display:none">لا توجد نتائج</div>
</div>

// Deduplicate by word
const seen = new Set();
const DATA = [];
for (const [w, t] of WORDS) {
  if (!seen.has(w)) { seen.add(w); DATA.push({word: w, tier: t}); }
}
DATA.sort((a,b) => a.tier - b.tier || a.word.localeCompare(b.word));

const TIER_LABELS = {1:'شائع جداً', 2:'شائع', 3:'أقل شيوعاً', 4:'نادر'};
const STORAGE_KEY = 'tg_usernames_v1';

let state = {}; // {word: {checked, notes}}
let currentTier = 'all';

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { state = {}; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const el = document.getElementById('saveIndicator');
  el.textContent = '✓ تم الحفظ تلقائياً';
  setTimeout(() => el.textContent = '', 2000);
}
function getState(word) { return state[word] || {checked: false, notes: ''}; }

function setTier(t, btn) {
  currentTier = t;
  document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  filterTable();
}

function filterTable() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const tbody = document.getElementById('tableBody');
  const rows = tbody.querySelectorAll('tr');
  let shown = 0;
  rows.forEach(row => {
    const word = row.dataset.word;
    const tier = parseInt(row.dataset.tier);
    const s = getState(word);
    let show = true;
    if (currentTier === 'untried' && s.checked) show = false;
    else if (currentTier !== 'all' && currentTier !== 'untried' && tier !== currentTier) show = false;
    if (show && q && !word.includes(q)) show = false;
    row.style.display = show ? '' : 'none';
    if (show) shown++;
  });
  document.getElementById('statShown').textContent = shown;
  document.getElementById('emptyMsg').style.display = shown === 0 ? '' : 'none';
  updateStats();
}

function updateStats() {
  const total = DATA.length;
  let done = 0, t1=0, t2=0, t3=0, t4=0;
  DATA.forEach(d => {
    if (getState(d.word).checked) done++;
    if (d.tier===1) t1++; else if (d.tier===2) t2++; else if (d.tier===3) t3++; else t4++;
  });
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statLeft').textContent = total - done;
  document.getElementById('s1').textContent = t1;
  document.getElementById('s2').textContent = t2;
  document.getElementById('s3').textContent = t3;
  document.getElementById('s4').textContent = t4;
  document.getElementById('progressBar').style.width = (done/total*100).toFixed(1) + '%';
}

function buildTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  DATA.forEach((d, i) => {
    const s = getState(d.word);
    const tr = document.createElement('tr');
    tr.dataset.word = d.word;
    tr.dataset.tier = d.tier;
    if (s.checked) tr.classList.add('done');
    tr.innerHTML = `
      <td class="td-num">${i+1}</td>
      <td class="td-tier"><span class="tier-badge tier-${d.tier}">${TIER_LABELS[d.tier]}</span></td>
      <td class="td-name"><a href="https://fragment.com/username/${d.word}" target="_blank">@${d.word}</a></td>
      <td class="td-check"><input type="checkbox" ${s.checked?'checked':''} onchange="toggle('${d.word}',this)"></td>
      <td class="td-notes"><input type="text" placeholder="ملاحظة..." value="${(s.notes||'').replace(/"/g,'&quot;')}" oninput="updateNote('${d.word}',this.value)"></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('statShown').textContent = DATA.length;
  updateStats();
}

function toggle(word, cb) {
  const s = getState(word);
  s.checked = cb.checked;
  state[word] = s;
  const row = cb.closest('tr');
  if (s.checked) row.classList.add('done'); else row.classList.remove('done');
  saveState();
  updateStats();
}

function updateNote(word, val) {
  const s = getState(word);
  s.notes = val;
  state[word] = s;
  saveState();
}

function exportData() {
  const out = DATA.map(d => ({ word: d.word, tier: d.tier, ...getState(d.word) }));
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tg_usernames_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const arr = JSON.parse(ev.target.result);
        arr.forEach(item => {
          if (item.word) state[item.word] = { checked: !!item.checked, notes: item.notes || '' };
        });
        saveState();
        buildTable();
        filterTable();
      } catch(err) { alert('خطأ في الملف: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

loadState();
buildTable();
filterTable();
