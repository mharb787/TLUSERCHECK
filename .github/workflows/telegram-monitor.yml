name: Telegram Username Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: telegram-username-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "12204622"
          MAX_ALERTS_PER_RUN: "200"
          MAX_USERNAMES_TO_CHECK: "5000"
          MIN_SCORE: "81"
        run: python main.py

      - name: Commit cache updates
        run: |
          if git diff --quiet data/checked_usernames.json data/pending_queue.json data/pagination_state.json 2>/dev/null; then
            echo "No cache changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/checked_usernames.json
          git add data/pending_queue.json 2>/dev/null || true
          git add data/pagination_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Cache already up to date after pulling latest main."
            exit 0
          fi
          git commit -m "Update checked Telegram username cache"
          git push
